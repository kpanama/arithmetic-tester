<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainer">
<meta name="theme-color" content="#0a0b0d">
<title>Arithmetic Trainer</title>
<style>
  :root{
    --bg:#0a0b0d; --panel:#121419; --line:#23262e;
    --ink:#e8eaed; --dim:#7d828c; --accent:#5ee6a8; --warn:#ff6b6b;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    -webkit-font-smoothing:antialiased;
    height:100dvh;display:flex;flex-direction:column;
    overflow:hidden;-webkit-user-select:none;user-select:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }

  /* play: top bar */
  .bar{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:12px 16px;border-bottom:1px solid var(--line);
    font-variant-numeric:tabular-nums;
  }
  .bar .stat{font-size:13px;letter-spacing:.05em;color:var(--dim);justify-self:start}
  .bar .stat b{color:var(--ink);font-weight:600}
  .bar .timer{font-size:13px;letter-spacing:.05em;color:var(--accent);font-weight:600;justify-self:center}
  .bar .timer.low{color:var(--warn)}
  .bar .stop{
    justify-self:end;background:none;border:1px solid var(--line);color:var(--dim);
    font-family:inherit;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    padding:6px 12px;border-radius:7px;cursor:pointer;touch-action:manipulation;
  }
  .bar .stop:active{border-color:var(--warn);color:var(--warn)}

  /* play: problem + answer.  Anchored toward the top third so the
     system keyboard (bottom of screen) never overlaps or pushes them. */
  .play{flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;gap:30px;padding:0 18px;
    padding-top:clamp(44px,13vh,130px)}
  .problem{font-size:clamp(38px,12vw,72px);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
  .answer{
    width:min(70vw,260px);background:transparent;border:none;
    border-bottom:2px solid var(--line);color:var(--accent);
    text-align:center;font-family:inherit;
    font-size:clamp(32px,10vw,56px);font-weight:600;
    font-variant-numeric:tabular-nums;padding:4px 0 8px;outline:none;
    -webkit-user-select:text;user-select:text;
  }
  .answer:focus{border-bottom-color:var(--accent)}

  /* overlays */
  .screen{position:fixed;inset:0;background:var(--bg);z-index:5;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:24px;padding:34px;text-align:center;}
  .screen.hidden{display:none}
  .cog{position:absolute;top:calc(env(safe-area-inset-top) + 14px);right:18px;
    background:none;border:none;color:var(--dim);font-size:20px;padding:6px;cursor:pointer}
  .title{font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
  .big{font-size:clamp(48px,17vw,100px);font-weight:600;color:var(--accent);
    font-variant-numeric:tabular-nums;line-height:1}
  .sub{font-size:14px;color:var(--dim);letter-spacing:.03em}

  /* results screen (after a run) */
  #endScreen{justify-content:flex-start;overflow-y:auto;
    padding-top:calc(env(safe-area-inset-top) + 46px);padding-bottom:36px}
  .results{display:flex;flex-direction:column;align-items:center;gap:16px;width:min(92vw,440px)}
  .panel{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .phead{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;text-align:left}
  #chart svg{display:block;width:100%;height:auto}
  .qrow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:7px 0;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  .qrow:last-child{border-bottom:none}
  .qrow .q{font-size:15px;color:var(--ink)}
  .qrow .t{font-size:14px;color:var(--warn);font-weight:600;white-space:nowrap}
  .empty{font-size:14px;color:var(--dim);text-align:center;padding:6px 0}
  .actions{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:2px}
  .btn{background:var(--accent);color:#05140d;border:none;border-radius:10px;
    font-family:inherit;font-size:16px;font-weight:600;letter-spacing:.02em;
    padding:14px 36px;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .linkbtn{background:none;border:none;color:var(--dim);font-family:inherit;
    font-size:13px;letter-spacing:.04em;text-decoration:underline;cursor:pointer;padding:4px}

  /* preset cards */
  .cards{display:flex;flex-direction:column;gap:10px;width:min(92vw,420px)}
  .card{
    text-align:left;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .1s}
  .card.sel{border-color:var(--accent);background:rgba(94,230,168,.06)}
  .card .name{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .card.sel .name{color:var(--accent)}
  .card .ops{font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.04em}
  .card .rng{font-size:12px;color:var(--dim);margin-top:4px;font-variant-numeric:tabular-nums}

  /* settings sheet */
  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:10;display:flex;align-items:flex-end}
  .sheet.hidden{display:none}
  .sheet-inner{width:100%;background:var(--panel);border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));
    max-height:84vh;overflow:auto}
  .sheet h2{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:16px}
  .sheet h2 span{color:var(--accent)}
  .op-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .chip{border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--dim);
    font-family:inherit;font-size:18px;font-weight:600;padding:12px;cursor:pointer;text-align:center}
  .chip.on{border-color:var(--accent);color:var(--accent);background:rgba(94,230,168,.07)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .row .note{font-size:13px;color:var(--dim)}
  .range-inputs{display:flex;gap:6px;align-items:center}
  input.num{width:64px;background:var(--bg);border:1px solid var(--line);border-radius:7px;
    color:var(--ink);font-family:inherit;font-size:15px;text-align:center;padding:7px 4px;outline:none}
  input.num:focus{border-color:var(--accent)}
  .range-inputs span{color:var(--dim);font-size:13px}
  .grp{margin-top:14px}
  .grp h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
  .sheet .btn{width:100%;margin-top:18px}
</style>
</head>
<body>

<!-- PLAY -->
<div class="bar">
  <div class="stat">SOLVED <b id="score">0</b></div>
  <div class="timer" id="timer">2:00</div>
  <button class="stop" id="stopBtn">Stop</button>
</div>
<div class="play">
  <div class="problem" id="problem">7 + 4</div>
  <input class="answer" id="answer" type="text" inputmode="numeric" pattern="[0-9]*"
         autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Answer">
</div>

<!-- HOME -->
<div class="screen" id="homeScreen">
  <button class="cog" id="homeCog" aria-label="Settings">&#9881;</button>
  <div class="title">Arithmetic Trainer</div>
  <div class="cards" id="cards"></div>
  <button class="btn" id="startBtn">Start</button>
</div>

<!-- END -->
<div class="screen hidden" id="endScreen">
  <button class="cog" id="endCog" aria-label="Settings">&#9881;</button>
  <div class="results">
    <div class="title" id="endTitle">Time</div>
    <div class="big" id="finalScore">0</div>
    <div class="sub" id="finalSub">0.0 per minute</div>
    <div class="panel" id="chartPanel">
      <div class="phead">Seconds per question</div>
      <div id="chart"></div>
    </div>
    <div class="panel" id="slowPanel">
      <div class="phead">Slowest questions</div>
      <div id="slowest"></div>
    </div>
    <div class="actions">
      <button class="btn" id="againBtn">Go again</button>
      <button class="linkbtn" id="changeBtn">Change mode</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="sheet hidden" id="sheet">
  <div class="sheet-inner">
    <h2>Settings &middot; <span id="sheetName">Mode</span></h2>
    <div class="op-grid">
      <button class="chip" data-op="add">+</button>
      <button class="chip" data-op="sub">&minus;</button>
      <button class="chip" data-op="mul">&times;</button>
      <button class="chip" data-op="div">&divide;</button>
    </div>
    <div class="row">
      <span class="note">Duration</span>
      <div class="range-inputs"><input class="num" id="dur" type="number" inputmode="numeric"><span>sec</span></div>
    </div>
    <div class="grp">
      <h3>Addition / Subtraction</h3>
      <div class="row"><span class="note">term A</span>
        <div class="range-inputs"><input class="num" id="aMin" type="number" inputmode="numeric"><span>&ndash;</span><input class="num" id="aMax" type="number" inputmode="numeric"></div></div>
      <div class="row"><span class="note">term B</span>
        <div class="range-inputs"><input class="num" id="bMin" type="number" inputmode="numeric"><span>&ndash;</span><input class="num" id="bMax" type="number" inputmode="numeric"></div></div>
    </div>
    <div class="grp">
      <h3>Multiplication / Division</h3>
      <div class="row"><span class="note">term A</span>
        <div class="range-inputs"><input class="num" id="cMin" type="number" inputmode="numeric"><span>&ndash;</span><input class="num" id="cMax" type="number" inputmode="numeric"></div></div>
      <div class="row"><span class="note">term B</span>
        <div class="range-inputs"><input class="num" id="dMin" type="number" inputmode="numeric"><span>&ndash;</span><input class="num" id="dMax" type="number" inputmode="numeric"></div></div>
    </div>
    <button class="btn" id="saveBtn">Done</button>
  </div>
</div>

<script>
(function(){
  /* ============================================================
     EDIT YOUR 3 PRESETS HERE.
     ops: which operations are active.  dur: seconds.
     add{} ranges feed + and -  ·  mul{} ranges feed x and /
     ============================================================ */
  const PRESETS = [
    { name:'Zetamac',
      ops:{add:true, sub:true, mul:true, div:true}, dur:120,
      add:{aMin:2,  aMax:100, bMin:2,  bMax:100},
      mul:{aMin:2,  aMax:12,  bMin:2,  bMax:100} },

    { name:'Mult / Div',
      ops:{add:false, sub:false, mul:true, div:true}, dur:120,
      add:{aMin:2,  aMax:100, bMin:2,  bMax:100},
      mul:{aMin:12, aMax:19,  bMin:12, bMax:100} },

    { name:'3-digit add / sub',
      ops:{add:true, sub:true, mul:false, div:false}, dur:120,
      add:{aMin:100,aMax:999, bMin:100,bMax:999},
      mul:{aMin:2,  aMax:12,  bMin:2,  bMax:100} },
  ];
  /* ============================================================ */

  const $ = id => document.getElementById(id);
  const rnd = (lo,hi) => Math.floor(Math.random()*(hi-lo+1))+lo;

  let sel=0, answer=0, score=0, running=false, startedAt=0, endAt=0, tick=null;
  let history=[], qStart=0, runT0=0;
  const cfg = () => PRESETS[sel];

  /* ---- preset cards ---- */
  function describe(p){
    const sym={add:'+',sub:'\u2212',mul:'\u00d7',div:'\u00f7'};
    const ops=['add','sub','mul','div'].filter(k=>p.ops[k]).map(k=>sym[k]).join('  ');
    const r=[];
    if(p.ops.add||p.ops.sub) r.push(`\u00b1 ${p.add.aMin}\u2013${p.add.aMax}, ${p.add.bMin}\u2013${p.add.bMax}`);
    if(p.ops.mul||p.ops.div) r.push(`\u00d7 ${p.mul.aMin}\u2013${p.mul.aMax}, ${p.mul.bMin}\u2013${p.mul.bMax}`);
    return {ops:`${ops}   \u00b7   ${p.dur}s`, rng:r.join('     ')};
  }
  function renderCards(){
    const wrap=$('cards'); wrap.innerHTML='';
    PRESETS.forEach((p,i)=>{
      const d=describe(p);
      const el=document.createElement('button');
      el.className='card'+(i===sel?' sel':'');
      el.innerHTML=`<div class="name">${p.name}</div><div class="ops">${d.ops}</div><div class="rng">${d.rng}</div>`;
      el.addEventListener('click',()=>{ sel=i; renderCards(); });
      wrap.appendChild(el);
    });
  }

  /* ---- gameplay ---- */
  function nextProblem(){
    const c=cfg();
    const pool=['add','sub','mul','div'].filter(k=>c.ops[k]);
    const op=pool[rnd(0,pool.length-1)];
    let text;
    if(op==='add'){const a=rnd(c.add.aMin,c.add.aMax),b=rnd(c.add.bMin,c.add.bMax);text=`${a} + ${b}`;answer=a+b;}
    else if(op==='sub'){const a=rnd(c.add.aMin,c.add.aMax),b=rnd(c.add.bMin,c.add.bMax);text=`${a+b} \u2212 ${a}`;answer=b;}
    else if(op==='mul'){const a=rnd(c.mul.aMin,c.mul.aMax),b=rnd(c.mul.bMin,c.mul.bMax);text=`${a} \u00d7 ${b}`;answer=a*b;}
    else{const a=rnd(c.mul.aMin,c.mul.aMax),b=rnd(c.mul.bMin,c.mul.bMax);text=`${a*b} \u00f7 ${a}`;answer=b;}
    $('problem').textContent=text;
    const a=$('answer'); a.value=''; if(running) a.focus();
    qStart=performance.now();
  }

  function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
  function update(){
    const left=Math.max(0,Math.round((endAt-Date.now())/1000));
    const t=$('timer'); t.textContent=fmt(left); t.classList.toggle('low',left<=10);
    if(left<=0) finish('time');
  }
  function start(){
    score=0; $('score').textContent='0'; history=[];
    running=true; startedAt=Date.now(); runT0=performance.now(); endAt=startedAt+cfg().dur*1000;
    $('homeScreen').classList.add('hidden'); $('endScreen').classList.add('hidden');
    update(); clearInterval(tick); tick=setInterval(update,250);
    nextProblem(); $('answer').focus();
  }
  function finish(reason){
    if(!running) return;
    running=false; clearInterval(tick); $('answer').blur();
    const elapsed=Math.min(cfg().dur,(Date.now()-startedAt)/1000);
    const rate=elapsed>=1 ? (score/(elapsed/60)).toFixed(1) : '0.0';
    $('endTitle').textContent = reason==='stopped' ? 'Stopped' : 'Time';
    $('finalScore').textContent=score;
    $('finalSub').textContent=rate+' per minute';
    renderResults();
    $('endScreen').classList.remove('hidden');
    $('endScreen').scrollTop=0;
  }

  /* ---- results: timeseries chart + slowest questions ---- */
  function buildChart(hist, dur){
    if(hist.length===0) return '<div class="empty">No questions solved.</div>';
    const W=440,H=150,padL=10,padR=10,padT=14,padB=20;
    const ys=hist.map(h=>h.dt);
    const xMax=dur||Math.max(...hist.map(h=>h.at),1);
    const yMax=Math.max(...ys)*1.12 || 1;
    const X=t=>padL+(t/xMax)*(W-padL-padR);
    const Y=v=>padT+(1-(v/yMax))*(H-padT-padB);
    const avg=ys.reduce((a,b)=>a+b,0)/ys.length;
    const order=[...hist.keys()].sort((a,b)=>ys[b]-ys[a]);
    const slowSet=new Set(order.slice(0,Math.min(5,hist.length)));
    let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Solve time per question">`;
    s+=`<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#23262e" stroke-width="1"/>`;
    s+=`<line x1="${padL}" y1="${Y(avg).toFixed(1)}" x2="${W-padR}" y2="${Y(avg).toFixed(1)}" stroke="#3a3f4a" stroke-width="1" stroke-dasharray="3 4"/>`;
    if(hist.length>1){
      const pts=hist.map(h=>`${X(h.at).toFixed(1)},${Y(h.dt).toFixed(1)}`).join(' ');
      s+=`<polyline points="${pts}" fill="none" stroke="#5ee6a8" stroke-width="1.4" stroke-opacity="0.45" stroke-linejoin="round"/>`;
    }
    hist.forEach((h,i)=>{
      const slow=slowSet.has(i);
      s+=`<circle cx="${X(h.at).toFixed(1)}" cy="${Y(h.dt).toFixed(1)}" r="${slow?3.2:2}" fill="${slow?'#ff6b6b':'#5ee6a8'}"/>`;
    });
    s+=`<text x="${W-padR}" y="${(Y(avg)-4).toFixed(1)}" text-anchor="end" font-size="9" fill="#7d828c" font-family="ui-monospace,monospace">avg ${avg.toFixed(1)}s</text>`;
    s+=`<text x="${padL}" y="${H-6}" font-size="9" fill="#7d828c" font-family="ui-monospace,monospace">0s</text>`;
    s+=`<text x="${W-padR}" y="${H-6}" text-anchor="end" font-size="9" fill="#7d828c" font-family="ui-monospace,monospace">${dur}s</text>`;
    s+=`</svg>`;
    return s;
  }
  function renderResults(){
    const has=history.length>0;
    $('chartPanel').style.display=has?'':'none';
    $('slowPanel').style.display=has?'':'none';
    if(!has) return;
    $('chart').innerHTML=buildChart(history,cfg().dur);
    const slow=[...history].sort((a,b)=>b.dt-a.dt).slice(0,5);
    $('slowest').innerHTML=slow.map(h=>
      `<div class="qrow"><span class="q">${h.text} = ${h.answer}</span><span class="t">${h.dt.toFixed(2)}s</span></div>`
    ).join('');
  }

  /* ---- answer input: auto-advance when correct ---- */
  $('answer').addEventListener('input',e=>{
    if(!running) return;
    const v=e.target.value.replace(/[^0-9]/g,'');
    if(v!==e.target.value) e.target.value=v;
    if(v!=='' && parseInt(v,10)===answer){
      const now=performance.now();
      history.push({text:$('problem').textContent, answer:answer, dt:(now-qStart)/1000, at:(now-runT0)/1000});
      score++; $('score').textContent=score; nextProblem();
    }
  });

  /* ---- settings ---- */
  const sheet=$('sheet');
  function openSettings(){
    const c=cfg();
    $('sheetName').textContent=c.name;
    document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('on',c.ops[ch.dataset.op]));
    $('dur').value=c.dur;
    $('aMin').value=c.add.aMin;$('aMax').value=c.add.aMax;$('bMin').value=c.add.bMin;$('bMax').value=c.add.bMax;
    $('cMin').value=c.mul.aMin;$('cMax').value=c.mul.aMax;$('dMin').value=c.mul.bMin;$('dMax').value=c.mul.bMax;
    sheet.classList.remove('hidden');
  }
  $('homeCog').addEventListener('click',openSettings);
  $('endCog').addEventListener('click',openSettings);
  document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>ch.classList.toggle('on')));
  $('saveBtn').addEventListener('click',()=>{
    const c=cfg(), ops={};
    document.querySelectorAll('.chip').forEach(ch=>ops[ch.dataset.op]=ch.classList.contains('on'));
    if(!Object.values(ops).some(Boolean)) ops.add=true;
    c.ops=ops;
    c.dur=Math.max(5,parseInt($('dur').value,10)||c.dur);
    c.add={aMin:+$('aMin').value,aMax:+$('aMax').value,bMin:+$('bMin').value,bMax:+$('bMax').value};
    c.mul={aMin:+$('cMin').value,aMax:+$('cMax').value,bMin:+$('dMin').value,bMax:+$('dMax').value};
    sheet.classList.add('hidden');
    renderCards();
  });
  sheet.addEventListener('click',e=>{ if(e.target===sheet) sheet.classList.add('hidden'); });

  /* ---- buttons ---- */
  $('startBtn').addEventListener('click',start);
  $('againBtn').addEventListener('click',start);
  $('stopBtn').addEventListener('click',()=>finish('stopped'));
  $('changeBtn').addEventListener('click',()=>{
    $('endScreen').classList.add('hidden'); $('homeScreen').classList.remove('hidden');
  });

  renderCards();
  $('timer').textContent=fmt(cfg().dur);

  /* ---- offline: register service worker (works once hosted over https) ---- */
  if('serviceWorker' in navigator && location.protocol==='https:'){
    window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
  }
})();
</script>
</body>
</html>
